spring:
  application:
    name: coingecko-api
  
  # Configuração JPA
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  
  # DataSource H2 (desenvolvimento)
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Cache Configuration
  cache:
    type: simple
    cache-names:
      - cryptos
      - cryptosBySymbol
      - allCryptos
      - topCryptos

# Logging com padrão detalhado
logging:
  level:
    root: INFO
    com.coingecko: DEBUG
    org.springframework.web: INFO
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# API CoinGecko
coingecko:
  api:
    enabled: true
    base-url: https://api.coingecko.com/api/v3

# Server com documentação OpenAPI
server:
  port: 8080
  servlet:
    context-path: /

# SpringDoc OpenAPI (Swagger)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

